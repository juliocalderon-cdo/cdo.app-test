<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>APP CDO</title>
    
    <!-- CRITICAL FIX: Force base font size to 16px to counter Apps Script iframe style injection in Chrome -->
    <script>
      (function() {
        if (window.self !== window.top) { 
          document.documentElement.style.fontSize = "16px";
        }
      })();
    </script>

    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.tailwindcss.com?plugins=typography"></script>
    <script>
      // Configure Tailwind to use the Inter font family.
      tailwind.config = {
        theme: {
          extend: {
            fontFamily: {
              sans: ['Inter', 'sans-serif'],
            },
          },
        },
      }
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
      *, *::before, *::after {
        box-sizing: border-box; /* CSS Reset */
      }
      html, body {
        margin: 0;
        padding: 0;
        font-family: 'Inter', sans-serif;
        /* Use viewport units for robust sizing inside iframes */
        width: 100vw;
        height: 100vh;
      }
      
      /* --- START: ROBUST LAYOUT FIX --- */
      /* Force the body to be a flex container that fills the viewport */
      body {
        display: flex;
        flex-direction: column;
      }
      /* Force the React root element to grow and fill all available space */
      #root {
        flex: 1;
        min-height: 0; /* Prevents flexbox overflow issues */
        display: flex; /* Make the root a flex container as well */
        flex-direction: column;
      }
      /* --- END: ROBUST LAYOUT FIX --- */

      /* Hide Google Apps Script developer banner */
      body > div:first-child[style*="position: fixed"] {
        display: none !important;
      }
    </style>
  <script type="importmap">
{
  "imports": {

    "react/": "https://esm.sh/react@^19.2.3/",
    "@google/genai": "https://esm.sh/@google/genai@^1.34.0",
    "xlsx": "https://esm.sh/xlsx@^0.18.5",
    "vite": "https://esm.sh/vite@^7.3.0",
    "@vitejs/plugin-react": "https://esm.sh/@vitejs/plugin-react@^5.1.2",
    "vite-plugin-singlefile": "https://esm.sh/vite-plugin-singlefile@^2.3.0",
    "react-markdown": "https://esm.sh/react-markdown@^10.1.0",
    "remark-gfm": "https://esm.sh/remark-gfm@^4.0.1"
  }
}
</script>
</head>
  <body class="text-zinc-200 bg-[rgb(65,64,64)]">
    <div id="root"></div>
    <script type="module" src="/index.tsx"></script>
  </body>
</html>
